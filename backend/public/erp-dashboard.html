<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Workspace - Abobby Nwa Hotel</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;color:#1f2937}header{background:#111827;color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:10}header h1{margin:0;font-size:22px}main{padding:24px;max-width:1280px;margin:0 auto}.card{background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.06);padding:20px;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}label{display:block;font-weight:700;margin-bottom:6px}input,textarea,select{width:100%;padding:11px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;background:#fff}textarea{min-height:80px}button,.btn{border:0;padding:10px 14px;border-radius:10px;background:#111827;color:#fff;cursor:pointer;font-weight:700;margin:2px;text-decoration:none;display:inline-block}button.secondary,.btn.secondary{background:#4b5563}button.danger{background:#dc2626}button.success{background:#059669}button.warning{background:#d97706}.hidden{display:none!important}.admin-alert{padding:12px 14px;border-radius:12px;margin-bottom:16px;font-weight:700;display:none}.admin-alert.success{display:block;background:#dcfce7;color:#166534;border:1px solid #86efac}.admin-alert.error{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:top}th{background:#f9fafb}.table-wrap{overflow-x:auto}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#e5e7eb;font-size:12px;font-weight:700}.pill.paid,.pill.confirmed,.pill.available,.pill.replied{background:#d1fae5;color:#047857}.pill.unpaid,.pill.pending,.pill.new,.pill.pending_review{background:#fef3c7;color:#92400e}.pill.cancelled,.pill.unavailable{background:#fee2e2;color:#991b1b}.section-title,.pager{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.toolbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:12px 0 16px;align-items:end}.muted{color:#6b7280;font-size:14px}.hero{background:linear-gradient(135deg,#111827,#1f2937);color:#fff;border-radius:24px;padding:28px;margin-bottom:22px;box-shadow:0 18px 45px rgba(15,23,42,.18)}.hero h2{font-size:30px;margin:0 0 8px}.hero p{margin:0;color:#cbd5e1}.top-actions{display:flex;gap:10px;flex-wrap:wrap}.login-box{max-width:440px;margin:80px auto}.login-box h2{margin-top:0}.status{font-weight:800;margin-top:10px}.status.error{color:#dc2626}
  </style>
</head>
<body>
  <header>
    <h1>🏨 Abobby Nwa Hotel ERP</h1>
    <div class="top-actions">
      <a class="btn secondary" href="/admin">Back to Admin</a>
      <a class="btn secondary" href="/staff">Staff Portal</a>
      <button id="logoutBtn" class="secondary hidden">Logout</button>
    </div>
  </header>

  <main>
    <section id="loginSection" class="card login-box">
      <h2>Admin / ERP Login</h2>
      <p class="muted">Login with Admin, Accountant, or Manager account to access ERP modules.</p>
      <form id="loginForm" class="grid">
        <div><label>Email</label><input id="email" type="email" required></div>
        <div><label>Password</label><input id="password" type="password" required></div>
        <div style="align-self:end"><button id="loginBtn" type="submit">Login</button></div>
      </form>
      <div id="loginStatus" class="status"></div>
    </section>

    <section id="dashboardSection" class="hidden">
      <div id="adminAlert" class="admin-alert"></div>
      <div class="hero">
        <h2>ERP Workspace</h2>
        <p>Manage hotel finance, expenses, inventory/store, and staff accounts from one organized workspace.</p>
      </div>
    </section>
  </main>

  <script src="/admin-assets/admin-login-upgrade.js?v=1"></script>
  <script src="/admin-assets/admin-expenses-erp.js?v=1"></script>
  <script src="/admin-assets/admin-inventory-erp.js?v=1"></script>
  <script src="/admin-assets/admin-staff-erp.js?v=1"></script>
  <script src="/admin-assets/admin-erp-organizer.js?v=2"></script>
</body>
</html>
